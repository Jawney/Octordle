<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octordle Personal</title>
    
    <!-- iOS Web App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Octordle">
    
    <!-- App Icon (8 in a square) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23121213'/><text x='50' y='65' font-family='Arial' font-size='60' fill='white' text-anchor='middle'>8</text></svg>">

    <style>
        :root {
            --bg: #121213;
            --text: #ffffff;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --border: #3a3a3c;
            --empty: #121213;
            --tile-size: clamp(30px, 8vw, 50px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
            background: var(--bg);
        }

        header h1 { font-size: 1.4rem; margin: 0; letter-spacing: 2px; }

        .btn {
            background: #3a3a3c;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }

        #game-container {
            flex-grow: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 150px; /* Space for tray */
        }

        .board {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px;
            border: 2px solid #222;
            border-radius: 8px;
            opacity: 0.6;
            transition: all 0.3s;
            background: #1a1a1b;
        }

        .board.active {
            opacity: 1;
            border-color: #555;
            background: #202021;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .board.solved {
            opacity: 0.4;
            background: #0a0a0a;
            border-color: var(--correct);
        }

        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.7rem;
            color: #888;
            font-weight: bold;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }

        .tile {
            aspect-ratio: 1;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            transition: transform 0.4s;
        }

        .tile[data-state="correct"] { background-color: var(--correct); border-color: var(--correct); }
        .tile[data-state="present"] { background-color: var(--present); border-color: var(--present); }
        .tile[data-state="absent"] { background-color: var(--absent); border-color: var(--absent); }
        .tile[data-state="tbd"] { border-color: #565758; }

        /* Keyboard / Input Tray */
        #input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(18, 18, 19, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            left: -9999px;
        }

        .status-tray {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            max-width: 500px;
            margin: 0 auto;
        }

        .key-hint {
            height: 35px;
            border-radius: 4px;
            background: #818384;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        .key-hint[data-state="correct"] { background-color: var(--correct); }
        .key-hint[data-state="present"] { background-color: var(--present); }
        .key-hint[data-state="absent"] { background-color: var(--absent); opacity: 0.3; }

        #mobile-trigger {
            width: 100%;
            margin-top: 10px;
            height: 44px;
            background: var(--correct);
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Message Overlay */
        #message {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .mode-indicator {
            font-size: 0.7rem;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }

        @media (max-width: 400px) {
            #game-container { grid-template-columns: 1fr; }
            .tile { font-size: 1.5rem; }
        }
    </style>
</head>
<body onclick="focusInput()">

    <header>
        <h1>OCTORDLE</h1>
        <div style="display: flex; gap: 8px;">
            <button class="btn" onclick="startNewGame()">NEW</button>
        </div>
    </header>

    <div id="game-container">
        <!-- 8 Boards will be generated here -->
    </div>

    <div id="message"></div>

    <div id="input-container">
        <div class="status-tray" id="status-tray">
            <!-- Alphabet hints -->
        </div>
        <button id="mobile-trigger" onclick="focusInput(event)">TAP TO TYPE</button>
        <div class="mode-indicator" id="mode-text">DAILY MODE</div>
        <input type="text" id="hidden-input" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <script>
        // Standard Wordle Dictionary (Partial list for initial version, full logic included)
        const ALL_WORDS = ["cigar","rebut","sissy","humph","awake","blush","focal","evade","naval","serve","heath","dwarf","model","karma","stink","grade","quiet","bench","abate","feign","major","death","fresh","crust","stool","colon","abase","marry","react","batty","pride","floss","helix","croak","staff","paper","unfed","whelp","trawl","outdo","adobe","crazy","sower","repay","digit","crate","cluck","spike","court","revel","float","along","point","stare","conic","rearm","pygmy","await","itchy","paddy","feast","shirk","ready","share","again","prowl","rover","girth","glaze","light","cruel","aback","enjoy","ridge","snarl","afire","pagan","lesser","shore","unite","shark","chasm","lipid","gully","chalk","flout","adept","asset","agora","shake","stony","media","motto","utter","bleed","conch","retro","tiny","fruit","glass","grape","green","guess","heart","house","juice","light","lemon","melon","money","music","night","ocean","party","piano","pilot","plane","phone","pizza","plant","radio","river","robot","shirt","shoes","smile","snake","space","spoon","storm","table","tiger","toast","touch","train","truck","voice","water","watch","whale","world","write","youth","zebra"];
        
        // Mulberry32 PRNG for seeded randomness
        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        const NUM_BOARDS = 8;
        const MAX_GUESSES = 13;
        let targetWords = [];
        let boardStates = []; 
        let currentGuess = "";
        let globalGuessCount = 0;
        let isDaily = true;

        function init(seed) {
            targetWords = [];
            boardStates = [];
            currentGuess = "";
            globalGuessCount = 0;
            
            const rand = mulberry32(seed);
            const container = document.getElementById('game-container');
            container.innerHTML = '';

            // Select 8 words
            for (let i = 0; i < NUM_BOARDS; i++) {
                const idx = Math.floor(rand() * ALL_WORDS.length);
                targetWords.push(ALL_WORDS[idx].toUpperCase());
                boardStates.push({ guesses: [], solved: false });
            }

            // Build UI
            for (let i = 0; i < NUM_BOARDS; i++) {
                const board = document.createElement('div');
                board.className = 'board';
                board.id = `board-${i}`;
                
                const header = document.createElement('div');
                header.className = 'board-header';
                header.innerHTML = `<span>BOARD ${i+1}</span><span id="board-status-${i}"></span>`;
                board.appendChild(header);

                for (let r = 0; r < MAX_GUESSES; r++) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    row.id = `board-${i}-row-${r}`;
                    for (let c = 0; c < 5; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        row.appendChild(tile);
                    }
                    board.appendChild(row);
                }
                container.appendChild(board);
            }

            initTray();
            updateVisuals();
            document.getElementById('mode-text').innerText = isDaily ? "DAILY MODE" : "PRACTICE MODE";
        }

        function initTray() {
            const tray = document.getElementById('status-tray');
            tray.innerHTML = '';
            "QWERTYUIOPASDFGHJKLZXCVBNM".split('').forEach(letter => {
                const hint = document.createElement('div');
                hint.className = 'key-hint';
                hint.id = `hint-${letter}`;
                hint.innerText = letter;
                tray.appendChild(hint);
            });
        }

        function startDaily() {
            isDaily = true;
            const today = new Date();
            const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            init(seed);
        }

        function startNewGame() {
            isDaily = false;
            init(Math.floor(Math.random() * 1000000));
        }

        function focusInput(e) {
            if (e) e.stopPropagation();
            const input = document.getElementById('hidden-input');
            input.focus();
        }

        const input = document.getElementById('hidden-input');
        input.addEventListener('input', (e) => {
            currentGuess = input.value.toUpperCase();
            updateVisuals();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (currentGuess.length === 5) {
                    if (!ALL_WORDS.includes(currentGuess.toLowerCase())) {
                        showMessage("Not in word list");
                        return;
                    }
                    submitGuess();
                    input.value = "";
                    currentGuess = "";
                } else {
                    showMessage("Too short");
                }
            }
        });

        function submitGuess() {
            if (globalGuessCount >= MAX_GUESSES) return;
            const guess = currentGuess;
            let allSolved = true;

            for (let i = 0; i < NUM_BOARDS; i++) {
                if (!boardStates[i].solved) {
                    boardStates[i].guesses.push(guess);
                    if (guess === targetWords[i]) {
                        boardStates[i].solved = true;
                        document.getElementById(`board-status-${i}`).innerText = "SOLVED";
                    }
                }
                if (!boardStates[i].solved) allSolved = false;
            }

            globalGuessCount++;
            updateVisuals();
            updateTrayHints();

            if (allSolved) {
                showMessage("🏆 OCTORDLE COMPLETE!");
                input.blur();
            } else if (globalGuessCount >= MAX_GUESSES) {
                showMessage("GAME OVER");
                input.blur();
            } else {
                // Auto-scroll to first unsolved
                const first = boardStates.findIndex(s => !s.solved);
                document.getElementById(`board-${first}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function updateVisuals() {
            for (let i = 0; i < NUM_BOARDS; i++) {
                const state = boardStates[i];
                const boardEl = document.getElementById(`board-${i}`);
                
                if (state.solved) boardEl.classList.add('solved');
                else boardEl.classList.add('active');

                // Render previous guesses
                state.guesses.forEach((guess, r) => {
                    const row = document.getElementById(`board-${i}-row-${r}`);
                    const results = getWordleFeedback(guess, targetWords[i]);
                    for (let c = 0; c < 5; c++) {
                        const tile = row.children[c];
                        tile.innerText = guess[c];
                        tile.setAttribute('data-state', results[c]);
                    }
                });

                // Render current typing
                if (!state.solved && globalGuessCount < MAX_GUESSES) {
                    const row = document.getElementById(`board-${i}-row-${globalGuessCount}`);
                    for (let c = 0; c < 5; c++) {
                        const tile = row.children[c];
                        tile.innerText = currentGuess[c] || "";
                        tile.setAttribute('data-state', currentGuess[c] ? 'tbd' : 'empty');
                    }
                }
            }
        }

        function getWordleFeedback(guess, target) {
            const results = new Array(5).fill('absent');
            const targetArr = target.split('');
            const guessArr = guess.split('');
            
            // Green pass
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) {
                    results[i] = 'correct';
                    targetArr[i] = null;
                    guessArr[i] = null;
                }
            }
            // Yellow pass
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] && targetArr.includes(guessArr[i])) {
                    results[i] = 'present';
                    targetArr[targetArr.indexOf(guessArr[i])] = null;
                }
            }
            return results;
        }

        function updateTrayHints() {
            // Update keyboard hints for the FIRST unsolved board
            const idx = boardStates.findIndex(s => !s.solved);
            if (idx === -1) return;

            const target = targetWords[idx];
            const guesses = boardStates[idx].guesses;
            const alphabet = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');

            alphabet.forEach(letter => {
                const hint = document.getElementById(`hint-${letter}`);
                let best = "";
                guesses.forEach(g => {
                    const feedback = getWordleFeedback(g, target);
                    for(let i=0; i<5; i++) {
                        if (g[i] === letter) {
                            if (feedback[i] === 'correct') best = 'correct';
                            else if (feedback[i] === 'present' && best !== 'correct') best = 'present';
                            else if (best === "") best = 'absent';
                        }
                    }
                });
                hint.setAttribute('data-state', best);
            });
        }

        function showMessage(txt) {
            const m = document.getElementById('message');
            m.innerText = txt;
            m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 3000);
        }

        startDaily();
    </script>
</body>
</html>
