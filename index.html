<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Octordle Debug</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #121213;
            --text: #ffffff;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --invalid: #e12d2d;
            --border: #3a3a3c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden; position: fixed;
        }
        header {
            padding: 10px; flex-shrink: 0;
            background: #1a1a1b; border-bottom: 1px solid var(--border);
            padding-top: env(safe-area-inset-top);
        }
        #debug-info {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(255,0,0,0.8); color: white;
            font-size: 10px; font-family: monospace; z-index: 9999;
            pointer-events: none; padding: 2px;
        }
        #game-view {
            flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        #board-container {
            width: 100%; height: 100%; display: flex;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .screen-wrapper {
            flex-shrink: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; padding: 5px; align-items: stretch;
        }
        .board {
            display: grid; grid-template-rows: repeat(13, 1fr);
            gap: 2px; background: #1a1a1b; border-radius: 4px; padding: 2px;
        }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; height: 100%; }
        .tile {
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; text-transform: uppercase;
        }
        .tile[data-state="correct"] { background-color: var(--correct); border-color: var(--correct); }
        .tile[data-state="present"] { background-color: var(--present); border-color: var(--present); }
        .tile[data-state="absent"] { background-color: var(--absent); border-color: var(--absent); }
        .row.invalid .tile { color: var(--invalid); border-color: var(--invalid); }

        #input-area { flex-shrink: 0; background: var(--bg); border-top: 1px solid var(--border); }
        .status-tray {
            display: grid; grid-template-columns: repeat(10, 1fr);
            gap: 2px; padding: 4px; max-width: 400px; margin: 0 auto;
        }
        .key-hint {
            height: 28px; border-radius: 4px; background: #818384;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold;
        }
        .key-hint[data-state="correct"] { background-color: var(--correct); }
        .key-hint[data-state="present"] { background-color: var(--present); }
        .key-hint[data-state="absent"] { background-color: var(--absent); opacity: 0.4; }
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; left: -9999px; }
        #mobile-trigger { width: 100%; height: 20px; background: transparent; border: none; color: #444; font-size: 8px; }
    </style>
</head>
<body onclick="focusInput()">
    <div id="debug-info">DEBUG: Waiting for viewport...</div>
    <header>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:bold; font-size:12px;">DEBUG OCTORDLE</span>
            <button onclick="startNewGame()" style="padding:4px 8px; font-size:10px;">NEW</button>
        </div>
    </header>
    <div id="game-view">
        <div id="board-container"></div>
    </div>
    <div id="input-area">
        <div class="status-tray" id="status-tray"></div>
        <button id="mobile-trigger">FOCUS KEYBOARD</button>
        <input type="text" id="hidden-input" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text">
    </div>
    <script>
        let SOLUTIONS = [];
        let ALLOWED = [];
        let targetWords = [];
        let boardStates = [];
        let currentScreenIdx = 0;
        let globalGuessCount = 0;
        let currentGuess = "";

        async function loadWords() {
            try {
                const [solRes, allowRes] = await Promise.all([
                    fetch('shuffled_real_wordles.txt'),
                    fetch('official_allowed_guesses.txt')
                ]);
                SOLUTIONS = (await solRes.text()).split(/\s+/).filter(w => w.length === 5).map(w => w.toUpperCase());
                ALLOWED = (await allowRes.text()).split(/\s+/).filter(w => w.length === 5).map(w => w.toUpperCase());
                init();
            } catch(e) { console.error(e); }
        }

        function init() {
            const container = document.getElementById('board-container');
            container.innerHTML = '';
            targetWords = []; boardStates = [];
            for(let i=0; i<8; i++) {
                targetWords.push(SOLUTIONS[Math.floor(Math.random() * SOLUTIONS.length)]);
                boardStates.push({ guesses: [], solved: false });
            }
            for(let s=0; s<4; s++) {
                const screen = document.createElement('div');
                screen.className = 'screen-wrapper';
                for(let b=0; b<2; b++) {
                    const boardIdx = s*2 + b;
                    const board = document.createElement('div');
                    board.className = 'board';
                    board.id = `board-${boardIdx}`;
                    for(let r=0; r<13; r++) {
                        const row = document.createElement('div');
                        row.className = 'row';
                        for(let c=0; c<5; c++) {
                            const tile = document.createElement('div');
                            tile.className = 'tile';
                            row.appendChild(tile);
                        }
                        board.appendChild(row);
                    }
                    screen.appendChild(board);
                }
                container.appendChild(screen);
            }
            initTray();
            updateUI();
            updateDebug();
        }

        function initTray() {
            const tray = document.getElementById('status-tray');
            tray.innerHTML = '';
            "QWERTYUIOPASDFGHJKLZXCVBNM".split('').forEach(l => {
                const h = document.createElement('div');
                h.className = 'key-hint';
                h.id = `hint-${l}`;
                h.innerText = l;
                tray.appendChild(h);
            });
        }

        function updateUI() {
            document.getElementById('board-container').style.transform = `translateX(-${currentScreenIdx * 100}%)`;
            for(let i=0; i<8; i++) {
                const board = document.getElementById(`board-${i}`);
                const state = boardStates[i];
                for(let r=0; r<13; r++) {
                    const row = board.children[r];
                    const guess = state.guesses[r];
                    if(guess) {
                        const feedback = getFeedback(guess, targetWords[i]);
                        for(let c=0; c<5; c++) {
                            const t = row.children[c];
                            t.innerText = guess[c];
                            t.setAttribute('data-state', feedback[c]);
                        }
                    } else if(r === globalGuessCount) {
                        for(let c=0; c<5; c++) {
                            const t = row.children[c];
                            t.innerText = currentGuess[c] || "";
                            t.setAttribute('data-state', currentGuess[c] ? 'tbd' : 'empty');
                        }
                    } else {
                        for(let c=0; c<5; c++) {
                            row.children[c].innerText = "";
                            row.children[c].setAttribute('data-state', 'empty');
                        }
                    }
                }
            }
            updateGlobalTray();
        }

        function getFeedback(guess, target) {
            const res = new Array(5).fill('absent');
            const tArr = target.split('');
            const gArr = guess.split('');
            for(let i=0; i<5; i++) { if(gArr[i] === tArr[i]) { res[i] = 'correct'; tArr[i] = null; gArr[i] = null; } }
            for(let i=0; i<5; i++) { if(gArr[i] && tArr.includes(gArr[i])) { res[i] = 'present'; tArr[tArr.indexOf(gArr[i])] = null; } }
            return res;
        }

        function updateGlobalTray() {
            const alphabet = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');
            alphabet.forEach(letter => {
                const hint = document.getElementById(`hint-${letter}`);
                let bestStatus = "";
                for(let i=0; i<8; i++) {
                    const target = targetWords[i];
                    boardStates[i].guesses.forEach(g => {
                        const f = getFeedback(g, target);
                        for(let c=0; c<5; c++) {
                            if(g[c] === letter) {
                                if(f[c] === 'correct') bestStatus = 'correct';
                                else if(f[c] === 'present' && bestStatus !== 'correct') bestStatus = 'present';
                                else if(bestStatus === "") bestStatus = 'absent';
                            }
                        }
                    });
                }
                hint.setAttribute('data-state', bestStatus);
            });
        }

        function focusInput() { document.getElementById('hidden-input').focus(); }
        const input = document.getElementById('hidden-input');
        input.addEventListener('input', () => { currentGuess = input.value.toUpperCase(); updateUI(); });
        input.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && currentGuess.length === 5) {
                if(!ALLOWED.includes(currentGuess)) { showInvalid(); return; }
                submitGuess();
            }
        });

        function submitGuess() {
            const g = currentGuess;
            for(let i=0; i<8; i++) {
                if(!boardStates[i].solved) {
                    boardStates[i].guesses.push(g);
                    if(g === targetWords[i]) boardStates[i].solved = true;
                }
            }
            globalGuessCount++; currentGuess = ""; input.value = ""; updateUI();
        }

        function showInvalid() {
            const wrapper = document.querySelectorAll('.screen-wrapper')[currentScreenIdx];
            wrapper.querySelectorAll('.board').forEach(b => {
                const row = b.children[globalGuessCount];
                row.classList.add('invalid');
                setTimeout(() => row.classList.remove('invalid'), 1000);
            });
        }

        function updateDebug() {
            const v = window.visualViewport;
            document.getElementById('debug-info').innerText = 
                `RES: ${window.innerWidth}x${window.innerHeight} | VIEW: ${Math.round(v.width)}x${Math.round(v.height)} (offset: ${Math.round(v.offsetTop)})`;
        }
        window.visualViewport.addEventListener('resize', updateDebug);
        window.visualViewport.addEventListener('scroll', updateDebug);

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if(Math.abs(diff) > 50) {
                if(diff > 0 && currentScreenIdx < 3) currentScreenIdx++;
                else if(diff < 0 && currentScreenIdx > 0) currentScreenIdx--;
                updateUI();
            }
        });

        loadWords();
    </script>
</body>
</html>
