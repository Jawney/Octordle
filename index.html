<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Octordle Personal</title>
    
    <!-- iOS Web App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Octordle">
    
    <!-- App Icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23121213'/><text x='50' y='65' font-family='Arial' font-size='60' fill='white' text-anchor='middle'>8</text></svg>">

    <style>
        :root {
            --bg: #121213;
            --text: #ffffff;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --border: #3a3a3c;
            --empty: #121213;
            --tile-size: 20px;
            --vh: 100vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        header {
            padding: 15px 15px 5px 15px;
            flex-shrink: 0;
            background: var(--bg);
            padding-top: calc(10px + env(safe-area-inset-top));
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        header h1 { font-size: 1rem; margin: 0; letter-spacing: 2px; font-weight: 800; }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: #3a3a3c;
            border: 1px solid #565758;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .btn.active {
            background: var(--correct);
            border-color: var(--correct);
        }

        #game-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            padding: 5px 0;
        }

        #board-container {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .screen-wrapper {
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 10px;
            align-items: center;
        }

        .board {
            display: grid;
            grid-template-rows: repeat(13, 1fr);
            gap: 3px;
            width: 100%;
            height: 100%;
            max-width: 200px;
            margin: 0 auto;
            padding: 4px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a1b;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
        }

        .tile {
            aspect-ratio: 1;
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--tile-size) * 0.55);
            font-weight: 700;
            text-transform: uppercase;
            user-select: none;
            border-radius: 2px;
        }

        .tile[data-state="correct"] { background-color: var(--correct); border-color: var(--correct); }
        .tile[data-state="present"] { background-color: var(--present); border-color: var(--present); }
        .tile[data-state="absent"] { background-color: var(--absent); border-color: var(--absent); }
        .tile[data-state="tbd"] { border-color: #565758; }

        #nav-indicators {
            height: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3a3a3c;
            transition: all 0.2s;
        }

        .dot.active { background: #fff; transform: scale(1.2); }
        .dot.solved { background: var(--correct); }

        #input-area {
            flex-shrink: 0;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .status-tray {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            padding: 8px;
            max-width: 450px;
            margin: 0 auto;
        }

        .key-hint {
            height: 34px;
            border-radius: 4px;
            background: #818384;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            transition: background 0.1s;
        }

        .key-hint[data-state="correct"] { background-color: var(--correct); }
        .key-hint[data-state="present"] { background-color: var(--present); }
        .key-hint[data-state="absent"] { background-color: var(--absent); opacity: 0.4; }

        #hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            left: -9999px;
        }

        #mobile-trigger {
            width: 100%;
            height: 20px;
            background: transparent;
            border: none;
            color: #333;
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #message {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body onclick="focusInput()">

    <header>
        <div class="header-top">
            <h1 id="mode-title">DAILY OCTORDLE</h1>
            <div class="header-controls">
                <span id="board-count" style="font-size: 0.7rem; color: #888; font-weight: bold;">1-2/8</span>
                <button class="btn" id="btn-daily" onclick="startDaily()">DAILY</button>
                <button class="btn" id="btn-new" onclick="startNewGame()">NEW</button>
            </div>
        </div>
    </header>

    <div id="game-view">
        <div id="board-container">
            <!-- 4 Screens -->
        </div>
    </div>

    <div id="nav-indicators"></div>

    <div id="message"></div>

    <div id="input-area">
        <div class="status-tray" id="status-tray"></div>
        <button id="mobile-trigger" onclick="focusInput(event)">Keyboard Link</button>
        <input type="text" id="hidden-input" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <script>
        let SOLUTIONS = [];
        let ALLOWED = [];
        let targetWords = [];
        let boardStates = [];
        let currentScreenIdx = 0;
        let currentGuess = "";
        let globalGuessCount = 0;
        let isDaily = true;
        let dailySeed = 0;
        
        let touchStartX = 0;
        let touchEndX = 0;

        async function loadWords() {
            try {
                const [solRes, allowRes] = await Promise.all([
                    fetch('shuffled_real_wordles.txt'),
                    fetch('official_allowed_guesses.txt')
                ]);
                const solTxt = await solRes.text();
                const allowTxt = await allowRes.text();
                
                SOLUTIONS = solTxt.split(/\s+/).filter(w => w.length === 5).map(w => w.toUpperCase());
                ALLOWED = allowTxt.split(/\s+/).filter(w => w.length === 5).map(w => w.toUpperCase());
                ALLOWED = Array.from(new Set([...ALLOWED, ...SOLUTIONS]));
                
                startDaily();
            } catch (err) {
                console.error("Failed to load dictionaries", err);
                SOLUTIONS = ["APPLE", "BEACH", "BRAIN", "BREAD", "BRUSH", "CHAIR", "CHEST", "CHORD"];
                ALLOWED = SOLUTIONS;
                startDaily();
            }
        }

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        function init(seed, loadingSaved = false) {
            targetWords = [];
            boardStates = [];
            currentGuess = "";
            globalGuessCount = 0;
            currentScreenIdx = 0;
            
            const rand = mulberry32(seed);
            const container = document.getElementById('board-container');
            const indicators = document.getElementById('nav-indicators');
            container.innerHTML = '';
            indicators.innerHTML = '';

            for (let i = 0; i < 8; i++) {
                const idx = Math.floor(rand() * SOLUTIONS.length);
                targetWords.push(SOLUTIONS[idx]);
                boardStates.push({ guesses: [], solved: false });
            }

            for (let s = 0; s < 4; s++) {
                const screen = document.createElement('div');
                screen.className = 'screen-wrapper';
                for (let b = 0; b < 2; b++) {
                    const boardIdx = s * 2 + b;
                    const board = document.createElement('div');
                    board.className = 'board';
                    board.id = `board-${boardIdx}`;
                    for (let r = 0; r < 13; r++) {
                        const row = document.createElement('div');
                        row.className = 'row';
                        for (let c = 0; c < 5; c++) {
                            const tile = document.createElement('div');
                            tile.className = 'tile';
                            row.appendChild(tile);
                        }
                        board.appendChild(row);
                    }
                    screen.appendChild(board);
                }
                container.appendChild(screen);

                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.id = `dot-${s}`;
                indicators.appendChild(dot);
            }

            if (isDaily && !loadingSaved) {
                loadGameState();
            }

            initTray();
            resizeGame();
            updateUI();
            focusInput();
        }

        function initTray() {
            const tray = document.getElementById('status-tray');
            tray.innerHTML = '';
            "QWERTYUIOPASDFGHJKLZXCVBNM".split('').forEach(letter => {
                const hint = document.createElement('div');
                hint.className = 'key-hint';
                hint.id = `hint-${letter}`;
                hint.innerText = letter;
                tray.appendChild(hint);
            });
        }

        function resizeGame() {
            const viewportH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const headerH = document.querySelector('header').offsetHeight;
            const inputH = document.getElementById('input-area').offsetHeight;
            const navH = document.getElementById('nav-indicators').offsetHeight;
            
            const availableH = viewportH - headerH - inputH - navH - 20; // 20px padding/margin
            
            // Calculate tile size so 13 rows fit. 13 rows + gaps.
            const tileSize = Math.floor(availableH / 14); // Using 14 to provide some safe buffer
            document.documentElement.style.setProperty('--tile-size', `${tileSize}px`);
        }

        window.visualViewport?.addEventListener('resize', resizeGame);
        window.visualViewport?.addEventListener('scroll', resizeGame);

        function updateUI() {
            const container = document.getElementById('board-container');
            container.style.transform = `translateX(-${currentScreenIdx * 100}%)`;
            document.getElementById('board-count').innerText = `${currentScreenIdx * 2 + 1}-${currentScreenIdx * 2 + 2}/8`;
            document.getElementById('mode-title').innerText = isDaily ? "DAILY OCTORDLE" : "PRACTICE OCTORDLE";
            
            document.getElementById('btn-daily').classList.toggle('active', isDaily);
            document.getElementById('btn-new').classList.toggle('active', !isDaily);

            for (let s = 0; s < 4; s++) {
                const dot = document.getElementById(`dot-${s}`);
                dot.className = 'dot';
                if (s === currentScreenIdx) dot.classList.add('active');
                if (boardStates[s*2].solved && boardStates[s*2+1].solved) dot.classList.add('solved');
            }

            updateVisuals();
            updateTrayHints();
        }

        function focusInput(e) {
            if (e) e.stopPropagation();
            document.getElementById('hidden-input').focus();
        }

        const input = document.getElementById('hidden-input');
        input.addEventListener('input', () => {
            currentGuess = input.value.toUpperCase();
            updateVisuals();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (currentGuess.length === 5) {
                    if (!ALLOWED.includes(currentGuess)) {
                        showMessage("INVALID WORD");
                        return;
                    }
                    submitGuess();
                } else {
                    showMessage("TOO SHORT");
                }
            }
        });

        function submitGuess() {
            if (globalGuessCount >= 13) return;
            const guess = currentGuess;
            let allSolved = true;

            for (let i = 0; i < 8; i++) {
                if (!boardStates[i].solved) {
                    boardStates[i].guesses.push(guess);
                    if (guess === targetWords[i]) boardStates[i].solved = true;
                }
                if (!boardStates[i].solved) allSolved = false;
            }

            globalGuessCount++;
            currentGuess = "";
            input.value = "";
            
            if (isDaily) saveGameState();
            updateUI();

            if (allSolved) showMessage("🏆 YOU WON!");
            else if (globalGuessCount >= 13) {
                showMessage("GAME OVER");
                // Reveal words in console or alert if needed
            }
        }

        function updateVisuals() {
            for (let i = 0; i < 8; i++) {
                const board = document.getElementById(`board-${i}`);
                const state = boardStates[i];
                for (let r = 0; r < 13; r++) {
                    const row = board.children[r];
                    const guess = state.guesses[r];
                    if (guess) {
                        const feedback = getFeedback(guess, targetWords[i]);
                        for (let c = 0; c < 5; c++) {
                            const tile = row.children[c];
                            tile.innerText = guess[c];
                            tile.setAttribute('data-state', feedback[c]);
                        }
                    } else if (r === globalGuessCount && !state.solved) {
                        for (let c = 0; c < 5; c++) {
                            const tile = row.children[c];
                            tile.innerText = currentGuess[c] || "";
                            tile.setAttribute('data-state', currentGuess[c] ? 'tbd' : 'empty');
                        }
                    } else {
                        for (let c = 0; c < 5; c++) {
                            const tile = row.children[c];
                            tile.innerText = "";
                            tile.setAttribute('data-state', 'empty');
                        }
                    }
                }
            }
        }

        function getFeedback(guess, target) {
            const res = new Array(5).fill('absent');
            const targetArr = target.split('');
            const guessArr = guess.split('');
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) {
                    res[i] = 'correct';
                    targetArr[i] = null;
                    guessArr[i] = null;
                }
            }
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] && targetArr.includes(guessArr[i])) {
                    res[i] = 'present';
                    targetArr[targetArr.indexOf(guessArr[i])] = null;
                }
            }
            return res;
        }

        function updateTrayHints() {
            const b1 = currentScreenIdx * 2;
            const b2 = b1 + 1;
            const alphabet = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');

            alphabet.forEach(letter => {
                const hint = document.getElementById(`hint-${letter}`);
                let status = "";
                [b1, b2].forEach(idx => {
                    const target = targetWords[idx];
                    boardStates[idx].guesses.forEach(g => {
                        const feedback = getFeedback(g, target);
                        for (let i=0; i<5; i++) {
                            if (g[i] === letter) {
                                if (feedback[i] === 'correct') status = 'correct';
                                else if (feedback[i] === 'present' && status !== 'correct') status = 'present';
                                else if (status === "") status = 'absent';
                            }
                        }
                    });
                });
                hint.setAttribute('data-state', status);
            });
        }

        function showMessage(txt) {
            const m = document.getElementById('message');
            m.innerText = txt;
            m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 3000);
        }

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 40) {
                if (diff > 0 && currentScreenIdx < 3) currentScreenIdx++;
                else if (diff < 0 && currentScreenIdx > 0) currentScreenIdx--;
                updateUI();
            }
        }

        document.getElementById('game-view').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
        document.getElementById('game-view').addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, false);

        function saveGameState() {
            const state = {
                seed: dailySeed,
                guesses: boardStates.map(b => b.guesses),
                count: globalGuessCount
            };
            localStorage.setItem('octordle_daily_state', JSON.stringify(state));
        }

        function loadGameState() {
            const saved = localStorage.getItem('octordle_daily_state');
            if (saved) {
                const state = JSON.parse(saved);
                if (state.seed === dailySeed) {
                    globalGuessCount = state.count;
                    for (let i = 0; i < 8; i++) {
                        boardStates[i].guesses = state.guesses[i];
                        if (boardStates[i].guesses.includes(targetWords[i])) {
                            boardStates[i].solved = true;
                        }
                    }
                }
            }
        }

        function startDaily() {
            isDaily = true;
            const today = new Date();
            dailySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            init(dailySeed);
        }

        function startNewGame() {
            isDaily = false;
            init(Math.floor(Math.random() * 1000000), true);
        }

        loadWords();
    </script>
</body>
</html>
