<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Octordle Personal</title>
    
    <!-- iOS Web App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Octordle">
    
    <!-- App Icon (8 in a square) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23121213'/><text x='50' y='65' font-family='Arial' font-size='60' fill='white' text-anchor='middle'>8</text></svg>">

    <style>
        :root {
            --bg: #121213;
            --text: #ffffff;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --border: #3a3a3c;
            --empty: #121213;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--bg);
            padding-top: env(safe-area-inset-top);
        }

        header h1 { font-size: 1.1rem; margin: 0; letter-spacing: 2px; }

        .btn {
            background: #3a3a3c;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
        }

        #game-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #board-container {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.3s ease-out;
        }

        .board-wrapper {
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .board {
            display: grid;
            grid-template-rows: repeat(13, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 300px;
            height: 100%;
            max-height: 600px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }

        .tile {
            aspect-ratio: 1;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
        }

        .tile[data-state="correct"] { background-color: var(--correct); border-color: var(--correct); }
        .tile[data-state="present"] { background-color: var(--present); border-color: var(--present); }
        .tile[data-state="absent"] { background-color: var(--absent); border-color: var(--absent); }
        .tile[data-state="tbd"] { border-color: #565758; }

        /* Board Indicators */
        #nav-indicators {
            height: 20px;
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #444;
            transition: background 0.3s;
        }

        .dot.active { background: #fff; }
        .dot.solved { background: var(--correct); }

        /* Keyboard / Status Tray */
        #input-area {
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .status-tray {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            padding: 8px;
            max-width: 500px;
            margin: 0 auto;
        }

        .key-hint {
            height: 32px;
            border-radius: 4px;
            background: #818384;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .key-hint[data-state="correct"] { background-color: var(--correct); }
        .key-hint[data-state="present"] { background-color: var(--present); }
        .key-hint[data-state="absent"] { background-color: var(--absent); opacity: 0.3; }

        #hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            left: -9999px;
        }

        #mobile-trigger {
            width: 100%;
            height: 40px;
            background: transparent;
            border: none;
            color: #555;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #message {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body onclick="focusInput()">

    <header>
        <h1 id="mode-title">OCTORDLE</h1>
        <div style="display: flex; gap: 8px;">
            <span id="board-count" style="font-size: 0.7rem; color: #888;">1/8</span>
            <button class="btn" onclick="startNewGame()">NEW</button>
        </div>
    </header>

    <div id="game-view">
        <div id="board-container">
            <!-- 8 Boards will be generated here -->
        </div>
        
        <div id="nav-indicators">
            <!-- 8 Dots will be generated here -->
        </div>
    </div>

    <div id="message"></div>

    <div id="input-area">
        <div class="status-tray" id="status-tray">
            <!-- Alphabet hints -->
        </div>
        <button id="mobile-trigger" onclick="focusInput(event)">Tap here if keyboard closes</button>
        <input type="text" id="hidden-input" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <script>
        // Use a compact representation for the word list
        const SOLUTIONS_STR = "cigarrebutsissyhumphawakeblushfocalevadenavalserveheathdwarfmodelkarmastinkgradequietbenchabatefeignmajordeathfreshcruststoolcolonabasemarryreactbattyprideflosshelixcroakstaffpaperunfedwhelptrawloutdoadobecrazysowerrepaydigitcratecluckspikecourtrevelfloatalongpointstareconicrearmpygmyawaititchypaddyfeastshirkreadyshareagainprowlrovergirthglazelightcruelabackenjoyridgesnarlafirepaganlessershoreunitesharkchasmlipidgullychalkfloutadeptassetagorashakestonymediamottoutterbleedconchretrotinyready"; // ... abbreviated for brevity, but I will include more logic below
        
        // I will dynamically fetch or provide a larger set in the final version
        // For now, let's assume a reasonably sized list for the prototype
        const ALL_WORDS = ["CIGAR", "REBUT", "SISSY", "HUMPH", "AWAKE", "BLUSH", "FOCAL", "EVADE", "NAVAL", "SERVE", "HEATH", "DWARF", "MODEL", "KARMA", "STINK", "GRADE", "QUIET", "BENCH", "ABATE", "FEIGN", "MAJOR", "DEATH", "FRESH", "CRUST", "STOOL", "COLON", "ABASE", "MARRY", "REACT", "BATTY", "PRIDE", "FLOSS", "HELIX", "CROAK", "STAFF", "PAPER", "UNFED", "WHELP", "TRAWL", "OUTDO", "ADOBE", "CRAZY", "SOWER", "REPAY", "DIGIT", "CRATE", "CLUCK", "SPIKE", "COURT", "REVEL", "FLOAT", "ALONG", "POINT", "STARE", "CONIC", "REARM", "PYGMY", "AWAIT", "ITCHY", "PADDY", "FEAST", "SHIRK", "READY", "SHARE", "AGAIN", "PROWL", "ROVER", "GIRTH", "GLAZE", "LIGHT", "CRUEL", "ABACK", "ENJOY", "RIDGE", "SNARL", "AFIRE", "PAGAN", "LESSER", "SHORE", "UNITE", "SHARK", "CHASM", "LIPID", "GULLY", "CHALK", "FLOUT", "ADEPT", "ASSET", "AGORA", "SHAKE", "STONY", "MEDIA", "MOTTO", "UTTER", "BLEED", "CONCH", "RETRO", "TINY", "APPLE", "BEACH", "BRAIN", "BREAD", "BRUSH", "CHAIR", "CHEST", "CHORD", "CLICK", "CLOCK", "CLOUD", "DANCE", "DIARY", "DRINK", "DRIVE", "EARTH", "FEAST", "FIELD", "FRUIT", "GLASS", "GRAPE", "GREEN", "GUESS", "HEART", "HOUSE", "JUICE", "LIGHT", "LEMON", "MELON", "MONEY", "MUSIC", "NIGHT", "OCEAN", "PARTY", "PIANO", "PILOT", "PLANE", "PHONE", "PIZZA", "PLANT", "RADIO", "RIVER", "ROBOT", "SHIRT", "SHOES", "SMILE", "SNAKE", "SPACE", "SPOON", "STORM", "TABLE", "TIGER", "TOAST", "TOUCH", "TRAIN", "TRUCK", "VOICE", "WATER", "WATCH", "WHALE", "WORLD", "WRITE", "YOUTH", "ZEBRA"];

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        const NUM_BOARDS = 8;
        const MAX_GUESSES = 13;
        let targetWords = [];
        let boardStates = [];
        let currentBoardIdx = 0;
        let currentGuess = "";
        let globalGuessCount = 0;
        let isDaily = true;

        // Touch handling for swiping
        let touchStartX = 0;
        let touchEndX = 0;

        function init(seed) {
            targetWords = [];
            boardStates = [];
            currentGuess = "";
            globalGuessCount = 0;
            currentBoardIdx = 0;
            
            const rand = mulberry32(seed);
            const container = document.getElementById('board-container');
            const indicators = document.getElementById('nav-indicators');
            container.innerHTML = '';
            indicators.innerHTML = '';

            for (let i = 0; i < NUM_BOARDS; i++) {
                const idx = Math.floor(rand() * ALL_WORDS.length);
                targetWords.push(ALL_WORDS[idx].toUpperCase());
                boardStates.push({ guesses: [], solved: false });

                // Create Board Wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'board-wrapper';
                
                const board = document.createElement('div');
                board.className = 'board';
                
                for (let r = 0; r < MAX_GUESSES; r++) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    for (let c = 0; c < 5; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        row.appendChild(tile);
                    }
                    board.appendChild(row);
                }
                wrapper.appendChild(board);
                container.appendChild(wrapper);

                // Create Dot
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.id = `dot-${i}`;
                indicators.appendChild(dot);
            }

            initTray();
            updateUI();
            focusInput();
        }

        function initTray() {
            const tray = document.getElementById('status-tray');
            tray.innerHTML = '';
            "QWERTYUIOPASDFGHJKLZXCVBNM".split('').forEach(letter => {
                const hint = document.createElement('div');
                hint.className = 'key-hint';
                hint.id = `hint-${letter}`;
                hint.innerText = letter;
                tray.appendChild(hint);
            });
        }

        function updateUI() {
            const container = document.getElementById('board-container');
            container.style.transform = `translateX(-${currentBoardIdx * 100}%)`;
            
            document.getElementById('board-count').innerText = `${currentBoardIdx + 1}/8`;
            document.getElementById('mode-title').innerText = isDaily ? "DAILY OCTORDLE" : "PRACTICE OCTORDLE";

            // Update dots
            for (let i = 0; i < NUM_BOARDS; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.className = 'dot';
                if (i === currentBoardIdx) dot.classList.add('active');
                if (boardStates[i].solved) dot.classList.add('solved');
            }

            updateVisuals();
            updateTrayHints();
        }

        function focusInput(e) {
            if (e) e.stopPropagation();
            const input = document.getElementById('hidden-input');
            input.focus();
        }

        const input = document.getElementById('hidden-input');
        input.addEventListener('input', (e) => {
            currentGuess = input.value.toUpperCase();
            updateVisuals();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (currentGuess.length === 5) {
                    if (!ALL_WORDS.includes(currentGuess)) {
                        showMessage("Not in word list");
                        return;
                    }
                    submitGuess();
                } else {
                    showMessage("Too short");
                }
            }
        });

        function submitGuess() {
            if (globalGuessCount >= MAX_GUESSES) return;
            const guess = currentGuess;
            let allSolved = true;

            for (let i = 0; i < NUM_BOARDS; i++) {
                if (!boardStates[i].solved) {
                    boardStates[i].guesses.push(guess);
                    if (guess === targetWords[i]) {
                        boardStates[i].solved = true;
                    }
                }
                if (!boardStates[i].solved) allSolved = false;
            }

            globalGuessCount++;
            currentGuess = "";
            input.value = "";
            
            updateUI();

            if (allSolved) showMessage("🏆 YOU WON!");
            else if (globalGuessCount >= MAX_GUESSES) showMessage("GAME OVER: " + targetWords.join(", "));
        }

        function updateVisuals() {
            const wrappers = document.querySelectorAll('.board-wrapper');
            wrappers.forEach((wrapper, i) => {
                const board = wrapper.querySelector('.board');
                const state = boardStates[i];
                
                // Rows
                for (let r = 0; r < MAX_GUESSES; r++) {
                    const row = board.children[r];
                    const guess = state.guesses[r];
                    
                    if (guess) {
                        const feedback = getFeedback(guess, targetWords[i]);
                        for (let c = 0; c < 5; c++) {
                            const tile = row.children[c];
                            tile.innerText = guess[c];
                            tile.setAttribute('data-state', feedback[c]);
                        }
                    } else if (r === globalGuessCount && !state.solved) {
                        for (let c = 0; c < 5; c++) {
                            const tile = row.children[c];
                            tile.innerText = currentGuess[c] || "";
                            tile.setAttribute('data-state', currentGuess[c] ? 'tbd' : 'empty');
                        }
                    } else {
                        for (let c = 0; c < 5; c++) {
                            const tile = row.children[c];
                            tile.innerText = "";
                            tile.setAttribute('data-state', 'empty');
                        }
                    }
                }
            });
        }

        function getFeedback(guess, target) {
            const results = new Array(5).fill('absent');
            const targetArr = target.split('');
            const guessArr = guess.split('');
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) {
                    results[i] = 'correct';
                    targetArr[i] = null;
                    guessArr[i] = null;
                }
            }
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] && targetArr.includes(guessArr[i])) {
                    results[i] = 'present';
                    targetArr[targetArr.indexOf(guessArr[i])] = null;
                }
            }
            return results;
        }

        function updateTrayHints() {
            const target = targetWords[currentBoardIdx];
            const guesses = boardStates[currentBoardIdx].guesses;
            const alphabet = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');

            alphabet.forEach(letter => {
                const hint = document.getElementById(`hint-${letter}`);
                let best = "";
                guesses.forEach(g => {
                    const feedback = getFeedback(g, target);
                    for(let i=0; i<5; i++) {
                        if (g[i] === letter) {
                            if (feedback[i] === 'correct') best = 'correct';
                            else if (feedback[i] === 'present' && best !== 'correct') best = 'present';
                            else if (best === "") best = 'absent';
                        }
                    }
                });
                hint.setAttribute('data-state', best);
            });
        }

        function showMessage(txt) {
            const m = document.getElementById('message');
            m.innerText = txt;
            m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 3000);
        }

        // Swipe Detection
        document.getElementById('game-view').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        document.getElementById('game-view').addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentBoardIdx < NUM_BOARDS - 1) currentBoardIdx++;
                else if (diff < 0 && currentBoardIdx > 0) currentBoardIdx--;
                updateUI();
            }
        }

        function startDaily() {
            isDaily = true;
            const today = new Date();
            const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            init(seed);
        }

        function startNewGame() {
            isDaily = false;
            init(Math.floor(Math.random() * 1000000));
        }

        startDaily();
    </script>
</body>
</html>
