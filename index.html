<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Octordle Pro Modular v1.8.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components/board.css">
    <link rel="stylesheet" href="css/components/keyboard.css">
</head>
<body>
    <div id="app-shell">
        <div id="safe-top"></div>
        <header>
            <h1 id="mode-label">DAILY OCTORDLE <small id="version-display" style="font-size: 0.6rem; opacity: 0.5; font-weight: normal;"></small></h1>
        </header>
        <div id="main-container">
            <div id="board-slider"></div>
        </div>

        <div id="nav-dots"></div>

        <div id="dock">
            <div class="keymap" id="keymap"></div>
            <input type="text" id="hidden-input" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text">
        </div>

        <div id="message"></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
