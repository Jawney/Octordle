<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Octordle Resolution Debug</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #121213;
            --text: #ffffff;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --invalid: #e12d2d;
            --border: #3a3a3c;
            /* Hard-coded for 430x873 iPhone */
            --header-h: 50px;
            --tray-h: 80px;
            --nav-h: 30px;
            --board-h: 600px; /* Default height, will be scaled by JS */
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden; position: fixed;
        }
        #debug-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 20px;
            background: rgba(255, 0, 0, 0.9); color: white;
            font-size: 10px; font-family: monospace; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        header {
            height: var(--header-h); flex-shrink: 0;
            background: #1a1a1b; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; padding-top: env(safe-area-inset-top);
        }
        header h1 { font-size: 0.9rem; margin: 0; font-weight: 900; }
        .btn-row { display: flex; gap: 8px; }
        .btn { background: #3a3a3c; border: 1px solid #555; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        
        #game-area {
            flex-grow: 1; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        #board-slider {
            width: 100%; height: 100%; display: flex;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .screen-pair {
            flex-shrink: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 10px; align-items: stretch;
        }
        .board-container {
            display: flex; flex-direction: column; height: 100%;
            background: #1a1a1b; border: 1px solid #333; border-radius: 6px; padding: 4px;
        }
        .grid {
            display: grid; grid-template-rows: repeat(13, 1fr); gap: 2px; height: 100%;
        }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .tile {
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; text-transform: uppercase;
            /* No aspect-ratio: 1; let it be rectangular to fit 13 rows */
        }
        .tile[data-state="correct"] { background-color: var(--correct); border-color: var(--correct); }
        .tile[data-state="present"] { background-color: var(--present); border-color: var(--present); }
        .tile[data-state="absent"] { background-color: var(--absent); border-color: var(--absent); }
        .row.invalid .tile { color: var(--invalid); border-color: var(--invalid); }

        #nav-dots {
            height: var(--nav-h); display: flex; gap: 10px; align-items: center; justify-content: center;
            background: var(--bg);
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #3a3a3c; }
        .dot.active { background: #fff; }
        .dot.solved { background: var(--correct); }

        #input-dock {
            height: var(--tray-h); flex-shrink: 0;
            background: var(--bg); border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .key-tray {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px;
            padding: 5px; max-width: 430px; margin: 0 auto;
        }
        .key {
            height: 32px; border-radius: 4px; background: #818384;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: bold;
        }
        .key[data-state="correct"] { background-color: var(--correct); }
        .key[data-state="present"] { background-color: var(--present); }
        .key[data-state="absent"] { background-color: var(--absent); opacity: 0.4; }

        #hidden-input { position: absolute; opacity: 0; pointer-events: none; left: -9999px; }
        #keyboard-trigger { width: 100%; height: 20px; background: transparent; border: none; color: #444; font-size: 9px; font-weight: bold; }
    </style>
</head>
<body onclick="focusInput()">
    <div id="debug-bar">OCTORDLE DEBUG: 430x873 | VIEW: ...</div>
    
    <header>
        <h1>DAILY OCTORDLE</h1>
        <div class="btn-row">
            <button class="btn" onclick="startDaily()">DAILY</button>
            <button class="btn" onclick="startNewGame()">NEW</button>
        </div>
    </header>

    <div id="game-area">
        <div id="board-slider"></div>
    </div>

    <div id="nav-dots"></div>

    <div id="input-dock">
        <div class="key-tray" id="key-tray"></div>
        <button id="keyboard-trigger">TAP FOR KEYBOARD</button>
        <input type="text" id="hidden-input" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text">
    </div>

    <script>
        let SOLUTIONS = [];
        let ALLOWED = [];
        let targetWords = [];
        let boardStates = [];
        let currentScreenIdx = 0;
        let globalGuessCount = 0;
        let currentGuess = "";
        let isDaily = true;

        async function load() {
            const [s, a] = await Promise.all([fetch('shuffled_real_wordles.txt'), fetch('official_allowed_guesses.txt')]);
            SOLUTIONS = (await s.text()).split(/\s+/).filter(w => w.length === 5).map(w => w.toUpperCase());
            ALLOWED = (await a.text()).split(/\s+/).filter(w => w.length === 5).map(w => w.toUpperCase());
            startDaily();
        }

        function init(seed) {
            const slider = document.getElementById('board-slider');
            const dots = document.getElementById('nav-dots');
            slider.innerHTML = ''; dots.innerHTML = '';
            targetWords = []; boardStates = []; globalGuessCount = 0; currentGuess = ""; currentScreenIdx = 0;
            
            const rand = mulberry32(seed);
            for(let i=0; i<8; i++) {
                targetWords.push(SOLUTIONS[Math.floor(rand() * SOLUTIONS.length)]);
                boardStates.push({ guesses: [], solved: false });
            }

            for(let s=0; s<4; s++) {
                const screen = document.createElement('div');
                screen.className = 'screen-pair';
                for(let b=0; b<2; b++) {
                    const idx = s*2 + b;
                    const container = document.createElement('div');
                    container.className = 'board-container';
                    const grid = document.createElement('div');
                    grid.className = 'grid';
                    grid.id = `board-${idx}`;
                    for(let r=0; r<13; r++) {
                        const row = document.createElement('div');
                        row.className = 'row';
                        for(let c=0; c<5; c++) {
                            const t = document.createElement('div');
                            t.className = 'tile';
                            row.appendChild(t);
                        }
                        grid.appendChild(row);
                    }
                    container.appendChild(grid);
                    screen.appendChild(container);
                }
                slider.appendChild(screen);
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.id = `dot-${s}`;
                dots.appendChild(dot);
            }
            initTray();
            updateUI();
            updateDebug();
            setTimeout(focusInput, 500);
        }

        function initTray() {
            const tray = document.getElementById('key-tray');
            tray.innerHTML = '';
            "QWERTYUIOPASDFGHJKLZXCVBNM".split('').forEach(l => {
                const k = document.createElement('div');
                k.className = 'key';
                k.id = `key-${l}`;
                k.innerText = l;
                tray.appendChild(k);
            });
        }

        function updateUI() {
            document.getElementById('board-slider').style.transform = `translateX(-${currentScreenIdx * 100}%)`;
            for(let s=0; s<4; s++) {
                document.getElementById(`dot-${s}`).classList.toggle('active', s === currentScreenIdx);
            }
            for(let i=0; i<8; i++) {
                const grid = document.getElementById(`board-${i}`);
                const state = boardStates[i];
                for(let r=0; r<13; r++) {
                    const row = grid.children[r];
                    const guess = state.guesses[r];
                    if(guess) {
                        const feedback = getFeedback(guess, targetWords[i]);
                        for(let c=0; c<5; c++) {
                            const t = row.children[c];
                            t.innerText = guess[c];
                            t.setAttribute('data-state', feedback[c]);
                        }
                    } else if(r === globalGuessCount && !state.solved) {
                        for(let c=0; c<5; c++) {
                            const t = row.children[c];
                            t.innerText = currentGuess[c] || "";
                            t.setAttribute('data-state', currentGuess[c] ? 'tbd' : 'empty');
                        }
                    } else {
                        for(let c=0; c<5; c++) {
                            row.children[c].innerText = "";
                            row.children[c].setAttribute('data-state', 'empty');
                        }
                    }
                }
            }
            updateGlobalKeymap();
        }

        function updateGlobalKeymap() {
            const alphabet = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');
            alphabet.forEach(letter => {
                const key = document.getElementById(`key-${letter}`);
                let best = "";
                for(let i=0; i<8; i++) {
                    const target = targetWords[i];
                    boardStates[i].guesses.forEach(g => {
                        const feedback = getFeedback(g, target);
                        for(let c=0; c<5; c++) {
                            if(g[c] === letter) {
                                if(feedback[c] === 'correct') best = 'correct';
                                else if(feedback[c] === 'present' && best !== 'correct') best = 'present';
                                else if(best === "") best = 'absent';
                            }
                        }
                    });
                }
                key.setAttribute('data-state', best);
            });
        }

        function getFeedback(guess, target) {
            const res = new Array(5).fill('absent');
            const tArr = target.split('');
            const gArr = guess.split('');
            for(let i=0; i<5; i++) { if(gArr[i] === tArr[i]) { res[i] = 'correct'; tArr[i] = null; gArr[i] = null; } }
            for(let i=0; i<5; i++) { if(gArr[i] && tArr.includes(gArr[i])) { res[i] = 'present'; tArr[tArr.indexOf(gArr[i])] = null; } }
            return res;
        }

        function focusInput() { document.getElementById('hidden-input').focus(); }
        const input = document.getElementById('hidden-input');
        input.addEventListener('input', () => { currentGuess = input.value.toUpperCase(); updateUI(); });
        input.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && currentGuess.length === 5) {
                if(!ALLOWED.includes(currentGuess)) { showInvalid(); return; }
                submitGuess();
            }
        });

        function submitGuess() {
            const g = currentGuess;
            for(let i=0; i<8; i++) {
                if(!boardStates[i].solved) {
                    boardStates[i].guesses.push(g);
                    if(g === targetWords[i]) boardStates[i].solved = true;
                }
            }
            globalGuessCount++; currentGuess = ""; input.value = ""; updateUI();
        }

        function showInvalid() {
            const screens = document.querySelectorAll('.screen-pair');
            screens[currentScreenIdx].querySelectorAll('.row').forEach(row => {
                if(row === row.parentElement.children[globalGuessCount]) {
                    row.classList.add('invalid');
                    setTimeout(() => row.classList.remove('invalid'), 800);
                }
            });
        }

        function updateDebug() {
            const v = window.visualViewport;
            document.getElementById('debug-bar').innerText = `VIEW: ${Math.round(v.width)}x${Math.round(v.height)} (offset: ${Math.round(v.offsetTop)})`;
            // Force re-layout of the body height based on viewport
            document.body.style.height = v.height + "px";
            document.body.style.top = v.offsetTop + "px";
        }
        window.visualViewport.addEventListener('resize', updateDebug);
        window.visualViewport.addEventListener('scroll', updateDebug);

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if(Math.abs(diff) > 40) {
                if(diff > 0 && currentScreenIdx < 3) currentScreenIdx++;
                else if(diff < 0 && currentScreenIdx > 0) currentScreenIdx--;
                updateUI();
            }
        });

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        function startDaily() { isDaily = true; const d = new Date(); init(d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate()); }
        function startNewGame() { isDaily = false; init(Math.floor(Math.random() * 1000000)); }

        load();
    </script>
</body>
</html>
